<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RON'S SPACE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Caveat:wght@400;600&family=JetBrains+Mono&family=Syne:wght@800&family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@200;800&display=swap" rel="stylesheet">
    
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root {
            --accent: #ff0000;
            --glass: rgba(10, 12, 18, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --font-main: 'Outfit', sans-serif;
            --radius-card: 24px;
            --radius-btn: 12px;
            --t-case: none;
            --l-space: 0px;
        }

        body{ font-family: var(--font-main); overflow:hidden; color:#fff; cursor:none; background: #03050a; height: 100vh; transition: all 0.4s ease; }

       
        .like-container {
            position: fixed; top: 25px; left: 25px; z-index: 500;
            background: var(--glass); border: 1px solid var(--border);
            backdrop-filter: blur(15px); border-radius: 50px;
            padding: 8px 18px; display: flex; align-items: center; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .like-trigger { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.6; white-space: nowrap; }
        .like-content { display: flex; align-items: center; gap: 10px; width: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; }
        .like-container:hover { padding-right: 20px; border-color: var(--accent); }
        .like-container:hover .like-trigger { display: none; }
        .like-container:hover .like-content { width: auto; opacity: 1; }
        .like-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .like-btn:hover:not(:disabled) { transform: scale(1.3); }
        .like-btn:disabled { opacity: 0.3; filter: grayscale(1); }
        .like-count { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 800; color: var(--accent); }

  
        #entry-gate { position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; transition: 0.8s; }
        #entry-gate.hide { opacity: 0; pointer-events: none; }
        #entry-gate h2 { font-weight: 800; font-size: 1.2rem; letter-spacing: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.2; } }

        .bg{ position:fixed; inset:-5%; z-index:-5; background:url('https://img.freepik.com/premium-photo/solitary-retro-yellow-camper-van-parked-serene-mountain-peak-twilight_127746-7745.jpg') center/cover; filter: brightness(0.25) blur(2px); animation: bgMove 40s infinite alternate; }
        @keyframes bgMove { from { transform: scale(1); } to { transform: scale(1.1); } }

        .rain { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .drop { position: absolute; background: rgba(255,255,255,0.12); width: 1px; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }

        .card{
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            width:min(385px,90vw); padding:35px 25px; border-radius: var(--radius-card);
            background: var(--glass); backdrop-filter:blur(30px); border: 1px solid var(--border);
            text-align:center; z-index:10; transition: all 0.5s ease;
        }

        .av { width: 105px; height: 105px; border-radius: 50%; border: 2px solid var(--accent); padding: 4px; box-shadow: 0 0 15px var(--accent); }
        h1 { font-size: 36px; font-weight: 800; letter-spacing: var(--l-space); text-transform: var(--t-case); margin-bottom: 2px; }
        .sub { font-family: 'Caveat', cursive; font-size: 18px; color: rgba(255,255,255,0.5); height: 24px; margin-bottom: 15px; }
        .visitors { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.3); margin-bottom: 20px; }
        #visCount { color: var(--accent); }

        .badges { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-bottom: 20px; }
        .badge { padding: 4px 10px; border-radius: 99px; font-size: 11px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); }

        .links { display: flex; flex-direction: column; gap: 8px; }
        .link { display: flex; align-items: center; justify-content: center; padding: 11px; border-radius: var(--radius-btn); text-decoration: none; color: #fff; font-weight: 600; font-size: 13px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); transition: 0.3s; text-transform: var(--t-case); letter-spacing: var(--l-space); }
        .link:hover { transform: translateY(-3px); border-color: var(--accent); background: rgba(255,255,255,0.1); }

        .player-panel {
            position: fixed; bottom: 25px; left: 25px; z-index: 200;
            width: 280px; padding: 20px; border-radius: 20px;
            background: rgba(5,8,15,0.9); border: 1px solid var(--border); backdrop-filter: blur(20px);
        }
        .p-top { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .p-art { width: 45px; height: 45px; border-radius: 8px; background: #000; overflow: hidden; }
        .p-title { font-size: 13px; font-weight: 700; }
        .p-artist { font-size: 11px; opacity: 0.5; font-family: 'Caveat', cursive; }
        .p-progress { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 10px 0; cursor: pointer; }
        .p-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; }
        .p-controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 12px; }
        .play-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        
        .vol-wrap { display: flex; align-items: center; gap: 10px; opacity: 0.7; }
        .vol-slider { flex: 1; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 5px; outline: none; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; }


        .theme-picker {
            position: fixed; bottom: 25px; right: 25px; z-index: 200;
            display: flex; gap: 8px; background: rgba(0,0,0,0.6); padding: 12px;
            border-radius: 50px; border: 1px solid var(--border); backdrop-filter: blur(10px);
            flex-wrap: wrap; max-width: 150px; justify-content: center;
        }
        .theme-btn { width: 20px; height: 20px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; }
        
        #cursor { position: fixed; width: 14px; height: 14px; border-radius: 50%; background: #fff; mix-blend-mode: difference; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
        @media(pointer:coarse){#cursor{display:none}}
    </style>
</head>
<body>

<div class="like-container">
    <div class="like-trigger">Like this site?</div>
    <div class="like-content">
        <button class="like-btn" id="likeBtn" onclick="handleLike()">👍</button>
        <span class="like-count" id="likeCount">0</span>
    </div>
</div>

<div id="entry-gate" onclick="startApp()">
    <h2>[ CLICK TO ENTER ]</h2>
</div>

<div class="bg"></div>
<div id="cursor"></div>
<div class="rain" id="rain"></div>

<div class="card">
    <video class="av" autoplay loop muted playsinline>
        <source src="https://media.tenor.com/MOthAbbtUhIAAAPo/dexter-morgan-edit-dexter-edit.mp4" type="video/mp4">
    </video>
    <h1 id="userName">Ron</h1>
    <p class="sub"><span id="typedText"></span></p>
    <div class="visitors"><span id="visCount">0</span> VISITORS</div>
    <div class="badges">
        <span class="badge">🚐 Camper Life</span>
        <span class="badge">⌨️ HTML Dev</span>
        <span class="badge">🌲 Outdoors</span>
        <span class="badge">🩸 Dexter</span>
    </div>
    <div class="links">
        <a href="https://discord.gg/a9C3yrTnqF" class="link" target="_blank">OGFN Server</a>
        <a href="https://discord.gg/Jku2KJZ8yR" class="link" target="_blank">Coding Server</a>
        <a href="https://www.youtube.com/@ronsogfncentre" class="link" target="_blank">My YouTube</a>
        <a href="https://www.tiktok.com/@r0n_0132" class="link" target="_blank">My Tiktok</a>
        <a href="https://ronsportfolio-ivory.vercel.app/" class="link" target="_blank">My Portfolio</a>
    </div>
</div>

<div class="player-panel">
    <div class="p-top">
        <div class="p-art"><img id="songArt" src="PromQueen.png" style="width:100%;height:100%;object-fit:cover;"></div>
        <div class="p-info">
            <div class="p-title" id="songTitle">Prom Queen</div>
            <div class="p-artist" id="songArtist">Beach Bunny</div>
        </div>
    </div>
    <div class="p-progress" id="pProg" onclick="seek(event)"><div class="p-fill" id="pFill"></div></div>
    <div class="p-controls">
        <button class="play-btn" id="playBtn">⏸</button>
        <button class="play-btn" onclick="nextSong()">⏭</button>
    </div>
    <div class="vol-wrap">
        <span>🔈</span>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.01" value="0.5">
    </div>
    <audio id="audio" loop></audio>
</div>

<div class="theme-picker">
    <div class="theme-btn" style="background: #ff0000;" onclick="setTheme('vampire')"></div>
    <div class="theme-btn" style="background: #220404;" onclick="setTheme('crimson')"></div>
    <div class="theme-btn" style="background: #0077ff;" onclick="setTheme('midnight')"></div>
    <div class="theme-btn" style="background: #1331ac;" onclick="setTheme('deepsea')"></div>
    <div class="theme-btn" style="background: #00ff88;" onclick="setTheme('forest')"></div>
    <div class="theme-btn" style="background: #ff00ff;" onclick="setTheme('cyber')"></div>
    <div class="theme-btn" style="background: #00f2ff;" onclick="setTheme('tokyo')"></div>
    <div class="theme-btn" style="background: #ffffff;" onclick="setTheme('ghost')"></div>
    <div class="theme-btn" style="background: #dbb415;" onclick="setTheme('gold')"></div>
</div>

<script>

const NAMESPACE = "ron_everything_v5";
const countUrl = `https://jasoncameron.dev/abacus/hit/${NAMESPACE}/likes`;

async function initLikes() {
    const countEl = document.getElementById('likeCount');
    if(localStorage.getItem('liked_v5')) document.getElementById('likeBtn').disabled = true;
    
    try {
        const res = await fetch(`https://jasoncameron.dev/abacus/get/${NAMESPACE}/likes`);
        const data = await res.json();
        countEl.innerText = data.value || 0;
    } catch(e) {
  
        countEl.innerText = localStorage.getItem('local_likes') || 0;
    }
}

async function handleLike() {
    if(localStorage.getItem('liked_v5')) return;
    const countEl = document.getElementById('likeCount');
    
    try {
        const res = await fetch(countUrl);
        const data = await res.json();
        countEl.innerText = data.value;
    } catch(e) {
      
        let val = parseInt(countEl.innerText) + 1;
        countEl.innerText = val;
        localStorage.setItem('local_likes', val);
    }
    localStorage.setItem('liked_v5', 'true');
    document.getElementById('likeBtn').disabled = true;
}


function startApp() {
    document.getElementById('entry-gate').classList.add('hide');
    audio.play();
    type();
    initLikes();
    let v = localStorage.getItem('ronVis') || 0;
    v++; localStorage.setItem('ronVis', v);
    document.getElementById('visCount').innerText = v.toLocaleString();
}

const phrases = ['late nights & open roads', 'OGFN · Camper Builder', 'gooner til i die', 'Dexter is the best'];
let p=0, c=0, d=false;
function type() {
    const cur = phrases[p], el = document.getElementById('typedText');
    el.textContent = d ? cur.slice(0, --c) : cur.slice(0, ++c);
    if(!d && c === cur.length) { d=true; setTimeout(type, 2000); }
    else if(d && c === 0) { d=false; p=(p+1)%phrases.length; setTimeout(type, 500); }
    else setTimeout(type, d ? 50 : 100);
}

const audio = document.getElementById('audio');
const playlist = [
    { t: "Prom Queen", a: "Beach Bunny", c: "PromQueen.png", f: "promqueen.mp3" },
    { t: "School Rooftop", a: "Hisohkah", c: "schoolrooftop.png", f: "schoolrooftop.mp3" }
];
let sIdx = 0;
function loadSong(i) {
    const s = playlist[i];
    audio.src = s.f;
    document.getElementById('songTitle').innerText = s.t;
    document.getElementById('songArtist').innerText = s.a;
    document.getElementById('songArt').src = s.c;
}
loadSong(0);
function nextSong() { sIdx=(sIdx+1)%playlist.length; loadSong(sIdx); audio.play(); }
function seek(e) { audio.currentTime = (e.offsetX / document.getElementById('pProg').offsetWidth) * audio.duration; }
document.getElementById('playBtn').onclick = () => {
    if(audio.paused) { audio.play(); playBtn.innerText = '⏸'; }
    else { audio.pause(); playBtn.innerText = '▶'; }
};
audio.ontimeupdate = () => document.getElementById('pFill').style.width = (audio.currentTime/audio.duration*100)+'%';
document.getElementById('volSlider').oninput = (e) => audio.volume = e.target.value;


document.addEventListener('mousemove', e => {
    const c = document.getElementById('cursor');
    c.style.left = e.clientX + 'px'; c.style.top = e.clientY + 'px';
});
const rain = document.getElementById('rain');
for(let i=0; i<80; i++){
    const drop = document.createElement('div');
    drop.className = 'drop'; drop.style.left = Math.random()*100+'vw';
    drop.style.animationDuration = (Math.random()*0.5+0.3)+'s';
    rain.appendChild(drop);
}


function setTheme(t) {
    const r = document.documentElement;
    const cfg = {
        'vampire': { a: '#ff0000', f: "'Syne', sans-serif", rd: '2px', c: 'uppercase', s: '5px' },
        'crimson': { a: '#ff0000', f: "'Syne', sans-serif", rd: '14px', c: 'none', s: '1px' },
        'midnight': { a: '#0077ff', f: "'Outfit', sans-serif", rd: '40px', c: 'none', s: '0px' },
        'deepsea': { a: '#324AB2', f: "'Outfit', sans-serif", rd: '1px', c: 'none', s: '0px' },
        'forest': { a: '#00ff88', f: "'JetBrains Mono', monospace", rd: '0px', c: 'none', s: '-0.5px' },
        'cyber': { a: '#ff00ff', f: "'Bebas Neue', sans-serif", rd: '15px', c: 'uppercase', s: '2px' },
        'tokyo': { a: '#00f2ff', f: "'Bebas Neue', sans-serif", rd: '8px', c: 'uppercase', s: '3px' },
        'ghost': { a: '#ffffff', f: "'Plus Jakarta Sans', sans-serif", rd: '50px', c: 'lowercase', s: '1px' },
        'gold': { a: '#ffcc00', f: "'Syne', sans-serif", rd: '20px', c: 'uppercase', s: '-1px' }
    }[t];
    r.style.setProperty('--accent', cfg.a);
    r.style.setProperty('--font-main', cfg.f);
    r.style.setProperty('--radius-card', cfg.rd);
    r.style.setProperty('--t-case', cfg.c);
    r.style.setProperty('--l-space', cfg.s);
}
</script>
</body>
</html>
