<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RON'S SPACE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Caveat:wght@400;600&family=JetBrains+Mono&family=Syne:wght@800&family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@200;800&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root {
            --accent: #ff0000;
            --glass: rgba(10, 12, 18, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --font-main: 'Outfit', sans-serif;
            --radius-card: 24px;
            --radius-btn: 12px;
        }

        body{ font-family: var(--font-main); overflow:hidden; color:#fff; cursor:none; background: #03050a; height: 100vh; }

       
        .like-container {
            position: fixed; top: 20px; left: 20px; z-index: 500;
            background: var(--glass); border: 1px solid var(--border);
            backdrop-filter: blur(15px); border-radius: 50px;
            padding: 6px 14px; display: flex; align-items: center; transition: 0.4s;
        }
        .like-trigger { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.6; }
        .like-content { display: flex; align-items: center; gap: 8px; width: 0; opacity: 0; overflow: hidden; transition: 0.4s; }
        .like-container:hover { padding-right: 15px; border-color: var(--accent); }
        .like-container:hover .like-trigger { display: none; }
        .like-container:hover .like-content { width: auto; opacity: 1; }
        .like-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .like-btn.liked { pointer-events: none; filter: grayscale(1); opacity: 0.5; }
        .like-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 800; color: var(--accent); }

      
        .bubble {
            position: absolute; background: var(--accent); color: #fff;
            padding: 4px 10px; border-radius: 8px; font-size: 10px;
            font-weight: 800; text-transform: uppercase; white-space: nowrap;
            pointer-events: none; opacity: 0; transform: translateY(10px);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000;
            right: 0;
        }
        .show-bubble { opacity: 1; transform: translateY(0); }

      
        .discord-wrap { position: fixed; top: 20px; right: 20px; z-index: 500; display: flex; flex-direction: column; align-items: flex-end; }
        .discord-widget {
            background: var(--glass); border: 1px solid var(--border);
            backdrop-filter: blur(15px); border-radius: 30px;
            padding: 5px; display: flex; align-items: center; 
            width: 42px; height: 42px; overflow: hidden; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .discord-widget:hover { width: 180px; padding: 5px 12px; border-radius: 12px; border-color: var(--accent); }
        .pfp-container { width: 32px; height: 32px; position: relative; flex-shrink: 0; }
        .dc-vid { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; position: absolute; top:0; left:0; transition: opacity 0.3s; }
        .dc-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; position: absolute; top:0; left:0; opacity: 0; transition: opacity 0.3s; }
        .discord-widget:hover .dc-vid { opacity: 0; }
        .discord-widget:hover .dc-img { opacity: 1; }
        .dc-info { margin-left: 12px; opacity: 0; transition: 0.3s; white-space: nowrap; }
        .discord-widget:hover .dc-info { opacity: 1; }
        .dc-name { font-weight: 800; font-size: 12px; display: block; }
        .dc-status-text { font-size: 9px; opacity: 0.5; text-transform: uppercase; }

      
        .player-container {
            position: fixed; bottom: 20px; left: 20px; z-index: 500;
            padding: 10px; border-radius: 15px; background: var(--glass);
            border: 1px solid var(--border); backdrop-filter: blur(20px);
            width: 100px; height: 45px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .player-container:hover { width: 220px; height: 130px; border-color: var(--accent); }
        .viz-bars { display: flex; align-items: flex-end; gap: 2px; height: 18px; transition: opacity 0.2s; opacity: 1; }
        .player-container:hover .viz-bars { opacity: 0 !important; visibility: hidden; }
        .bar { width: 3px; background: var(--accent); border-radius: 1px; animation: viz-bounce 0.5s infinite alternate; }
        @keyframes viz-bounce { from { height: 4px; } to { height: 16px; } }
        
        .player-content { position: absolute; opacity: 0; pointer-events: none; width: 180px; transition: 0.3s; }
        .player-container:hover .player-content { opacity: 1; pointer-events: auto; }
        .p-info { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .p-art { width: 30px; height: 30px; border-radius: 4px; object-fit: cover; }
        .p-title { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-artist { font-size: 9px; opacity: 0.5; }
        
        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .c-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 14px; }
        .vol-slider { width: 100%; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 5px; margin-top: 5px; cursor: pointer; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

        
        .van-clock-container { position: fixed; bottom: -5px; left: 50%; transform: translateX(-50%); z-index: 400; display: flex; justify-content: center; }
        .van-svg { width: 120px; height: auto; filter: drop-shadow(0 0 10px var(--accent)); }
        .uk-time-display { 
            position: absolute; top: 29px; left: 50.5%; transform: translateX(-50%); 
            width: 60px; font-family: 'JetBrains Mono', monospace; font-size: 9px; 
            font-weight: 800; color: #000; text-align: center; letter-spacing: -0.2px;
        }

        .theme-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 500; display: flex; flex-direction: column; align-items: flex-end; }
        .theme-container { background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(15px); border-radius: 30px; padding: 8px; width: 42px; height: 42px; overflow: hidden; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; }
        .theme-container:hover { width: 280px; border-radius: 15px; }
        .theme-icon { font-size: 18px; margin-right: 15px; flex-shrink: 0; }
        .theme-grid { display: flex; gap: 6px; opacity: 0; transition: 0.3s; }
        .theme-container:hover .theme-grid { opacity: 1; }
        .theme-btn { width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; }

     
        #entry-gate { position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #entry-gate.hide { opacity: 0; pointer-events: none; transition: 0.8s; }
        .enter-btn-text { 
            letter-spacing:10px; font-size:12px; opacity:0.6; 
            animation: pulse-text 2s infinite ease-in-out; 
        }
        @keyframes pulse-text {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

   
        .card{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:min(350px,90vw); padding:30px 20px; border-radius: var(--radius-card); background: var(--glass); backdrop-filter:blur(30px); border: 1px solid var(--border); text-align:center; z-index:10; transition: 0.5s; box-shadow: 0 40px 80px rgba(0,0,0,0.8); animation: pulse-border-wide 5s infinite alternate; }
        @keyframes pulse-border-wide { 0%, 100% { box-shadow: 0 40px 80px rgba(0,0,0,0.8); } 50% { box-shadow: 0 0 25px var(--accent); } }
        
        .bg{ position:fixed; inset:-5%; z-index:-5; background:url('https://img.freepik.com/premium-photo/solitary-retro-yellow-camper-van-parked-serene-mountain-peak-twilight_127746-7745.jpg') center/cover; filter: brightness(0.25) blur(2px); }
        .rain { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .drop { position: absolute; background: rgba(255,255,255,0.12); width: 1px; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }

        .av-main { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--accent); padding: 4px; object-fit: cover; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 2px; }
        .sub { font-family: 'Caveat', cursive; font-size: 15px; color: rgba(255,255,255,0.5); margin-bottom: 15px; height: 18px; }
        .links { display: flex; flex-direction: column; gap: 6px; }
        .link { padding: 9px; border-radius: var(--radius-btn); text-decoration: none; color: #fff; font-weight: 600; font-size: 11px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); transition: 0.3s; }
        .link:hover { transform: translateY(-2px); border-color: var(--accent); background: rgba(255,255,255,0.1); }
        
        #cursor { position: fixed; width: 10px; height: 10px; border-radius: 50%; background: #fff; mix-blend-mode: difference; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
    </style>
</head>
<body>

<div id="cursor"></div>

<div class="like-container">
    <div class="like-trigger">Like?</div>
    <div class="like-content">
        <button class="like-btn" id="likeBtn" onclick="handleLike()">👍</button>
        <span class="like-count" id="likeCount">0</span>
    </div>
</div>

<div class="discord-wrap">
    <div id="dc-bubble" class="bubble" style="top: -30px;">Hover Over Me</div>
    <div class="discord-widget">
        <div class="pfp-container">
            <video class="dc-vid" autoplay loop muted playsinline>
                <source src="https://images-ext-1.discordapp.net/external/-ikmhMdgOYVi74vVmt1D_9s-ic2VcBIVCgH_5Lad1s8/https/media.tenor.com/SY-PVI3tjv0AAAPo/brian-moser.mp4" type="video/mp4">
            </video>
            <img id="dc-img" class="dc-img" src="">
        </div>
        <div class="dc-info">
            <span id="dc-username" class="dc-name">Ron</span>
            <span id="dc-status-text" class="dc-status-text">Online</span>
        </div>
    </div>
</div>

<div id="entry-gate" onclick="startApp()">
    <h2 class="enter-btn-text">[ ENTER ]</h2>
</div>

<div class="bg"></div>
<div class="rain" id="rain"></div>

<div class="card">
    <video class="av-main" autoplay loop muted playsinline>
        <source src="https://images-ext-1.discordapp.net/external/-ikmhMdgOYVi74vVmt1D_9s-ic2VcBIVCgH_5Lad1s8/https/media.tenor.com/SY-PVI3tjv0AAAPo/brian-moser.mp4" type="video/mp4">
    </video>
    <h1 id="userName">RON'S SPACE</h1>
    <p class="sub"><span id="typedText"></span></p>
    <div class="links">
        <a href="https://discord.gg/a9C3yrTnqF" class="link" target="_blank">OGFN Server</a>
        <a href="https://discord.gg/Jku2KJZ8yR" class="link" target="_blank">Coding Server</a>
        <a href="https://www.youtube.com/@ronsogfncentre" class="link" target="_blank">My YouTube</a>
        <a href="https://www.tiktok.com/@r0n_0132" class="link" target="_blank">My Tiktok</a>
        <a href="https://ronsportfolio-ivory.vercel.app/" class="link" target="_blank">My Portfolio</a>
    </div>
</div>

<div class="player-container">
    <div class="viz-bars" id="viz">
        <div class="bar"></div><div class="bar" style="animation-delay:0.1s"></div><div class="bar" style="animation-delay:0.2s"></div><div class="bar" style="animation-delay:0.3s"></div>
    </div>
    <div class="player-content">
        <div class="p-info">
            <img id="songArt" class="p-art" src="">
            <div style="min-width:0;"><div class="p-title" id="songTitle">Loading...</div><div class="p-artist" id="songArtist">Please wait</div></div>
        </div>
        <div class="controls">
            <button class="c-btn" id="playPauseBtn" onclick="togglePlay()">⏸</button>
            <button class="c-btn" onclick="nextSong()">⏭</button>
            <span style="font-size:7px; opacity:0.4;">VOL</span>
        </div>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.01" value="0.5">
    </div>
    <audio id="audio"></audio>
</div>

<div class="theme-wrap">
    <div id="theme-bubble" class="bubble" style="top: -30px;">Themes</div>
    <div class="theme-container">
        <span class="theme-icon">🎨</span>
        <div class="theme-grid">
            <div class="theme-btn" style="background:#ff0000" onclick="setTheme('vampire')"></div>
            <div class="theme-btn" style="background:#0077ff" onclick="setTheme('midnight')"></div>
            <div class="theme-btn" style="background:#00ff88" onclick="setTheme('forest')"></div>
            <div class="theme-btn" style="background:#ff6600" onclick="setTheme('lava')"></div>
            <div class="theme-btn" style="background:#ccff00" onclick="setTheme('toxic')"></div>
            <div class="theme-btn" style="background:#bb00ff" onclick="setTheme('deepspace')"></div>
            <div class="theme-btn" style="background:#fff" onclick="setTheme('ghost')"></div>
        </div>
    </div>
</div>

<div class="van-clock-container">
    <div style="position:relative;">
        <svg class="van-svg" viewBox="0 0 200 120">
            <rect x="30" y="40" width="140" height="60" rx="8" fill="#f2f2f2"/>
            <rect x="70" y="45" width="60" height="25" rx="3" fill="#87ceeb" stroke="#333" stroke-width="1"/>
            <path d="M140 45H160V65H140V45Z" fill="#333"/>
            <circle cx="60" cy="100" r="10" fill="#1a1a1a"/><circle cx="140" cy="100" r="10" fill="#1a1a1a"/>
            <rect x="30" y="75" width="140" height="8" fill="var(--accent)"/>
        </svg>
        <div id="ukTime" class="uk-time-display">00:00</div>
    </div>
</div>

<script>
const DISCORD_ID = "1433549145251123234"; 
const NAMESPACE = "rons_space_v12";

const playlist = [
    { t: "Prom Queen", a: "Beach Bunny", c: "PromQueen.png", f: "promqueen.mp3" },
    { t: "School Rooftop", a: "Hisohkah", c: "schoolrooftop.png", f: "schoolrooftop.mp3" },
    { t: "We Fell In love In October", a: "Girl in red", c: "we fell in love in october.png", f: "we fell in love in october.mp3" },
    { t: "Sailor Song", a: "Gigi Perez", c: "sailor song.png", f: "sailor song.mp3" },
    { t: "Sweater Weather", a: "The Neighbourhood", c: "sweater weather.png", f: "sweater weather.mp3" },
    { t: "Payphone", a: "Maroon 5", c: "payphone.png", f: "payphone.mp3" },
    { t: "comfort chain", a: "Instupendo", c: "comfort chain.png", f: "comfort chain.mp3" },
    { t: "I Think We’re Alone Now", a: "Tiffany", c: "I Think We’re Alone Now.png", f: "I Think We’re Alone Now.mp3" },
    { t: "aquatic ambience", a: "scizzie", c: "aquatic ambience.png", f: "aquatic ambience.mp3" },
    { t: "End Of Beginning", a: "DJO", c: "End Of Beginning.png", f: "End Of Beginning.mp3" }
];
 

let sIdx = Math.floor(Math.random() * playlist.length); 
let liked = localStorage.getItem(NAMESPACE + '_liked') === 'true';
let likeCount = parseInt(localStorage.getItem(NAMESPACE + '_count')) || 0;

document.getElementById('likeCount').innerText = likeCount;
if(liked) document.getElementById('likeBtn').classList.add('liked');

function handleLike() {
    if(!liked) {
        likeCount++;
        liked = true;
        localStorage.setItem(NAMESPACE + '_liked', 'true');
        localStorage.setItem(NAMESPACE + '_count', likeCount);
        document.getElementById('likeCount').innerText = likeCount;
        document.getElementById('likeBtn').classList.add('liked');
    }
}

async function fetchDiscord() {
    try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
        const { data } = await res.json();
        document.getElementById('dc-username').innerText = data.discord_user.global_name || data.discord_user.username;
        document.getElementById('dc-status-text').innerText = data.discord_status;
        document.getElementById('dc-img').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png`;
    } catch (e) {}
}

function updateUKTime() {
    const options = { timeZone: 'Europe/London', hour: '2-digit', minute: '2-digit', hour12: false };
    document.getElementById('ukTime').innerText = new Date().toLocaleTimeString('en-GB', options);
}

function startApp() {
    document.getElementById('entry-gate').classList.add('hide');
    audio.play();
    type();
    fetchDiscord();
    updateUKTime();
    setInterval(updateUKTime, 1000);
    
    setTimeout(() => {
        document.querySelectorAll('.bubble').forEach(b => b.classList.add('show-bubble'));
        setTimeout(() => {
            document.querySelectorAll('.bubble').forEach(b => b.classList.remove('show-bubble'));
        }, 4000);
    }, 2000);
}

const phrases = ['late nights & open roads', 'OGFN · Camper Builder', 'gooner til i die', 'Dexter is the best'];
let p=0, c=0, d=false;
function type() {
    const cur = phrases[p], el = document.getElementById('typedText');
    el.textContent = d ? cur.slice(0, --c) : cur.slice(0, ++c);
    if(!d && c === cur.length) { d=true; setTimeout(type, 2000); }
    else if(d && c === 0) { d=false; p=(p+1)%phrases.length; setTimeout(type, 500); }
    else setTimeout(type, d ? 50 : 100);
}

const audio = document.getElementById('audio');
const playPauseBtn = document.getElementById('playPauseBtn');

function loadSong(i) {
    const s = playlist[i];
    audio.src = s.f;
    document.getElementById('songTitle').innerText = s.t;
    document.getElementById('songArtist').innerText = s.a;
    document.getElementById('songArt').src = s.c;
}
loadSong(sIdx);

function togglePlay() { 
    if(audio.paused) { audio.play(); playPauseBtn.innerText = "⏸"; }
    else { audio.pause(); playPauseBtn.innerText = "▶"; }
}

function nextSong() { 
    sIdx = (sIdx + 1) % playlist.length; 
    loadSong(sIdx); 
    audio.play(); 
    playPauseBtn.innerText = "⏸";
}

document.getElementById('volSlider').oninput = (e) => audio.volume = e.target.value;

document.addEventListener('mousemove', e => {
    const cur = document.getElementById('cursor');
    cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px';
});

const rain = document.getElementById('rain');
for(let i=0; i<50; i++){
    const drop = document.createElement('div');
    drop.className = 'drop'; drop.style.left = Math.random()*100+'vw';
    drop.style.animationDuration = (Math.random()*0.5+0.5)+'s';
    rain.appendChild(drop);
}

function setTheme(t) {
    const r = document.documentElement;
    const cfg = {
        'vampire': { a: '#ff0000', f: "'Syne', sans-serif" },
        'midnight': { a: '#0077ff', f: "'Outfit', sans-serif" },
        'forest': { a: '#00ff88', f: "'JetBrains Mono', monospace" },
        'lava': { a: '#ff6600', f: "'Syne', sans-serif" },
        'toxic': { a: '#ccff00', f: "'JetBrains Mono', monospace" },
        'deepspace': { a: '#bb00ff', f: "'Space Grotesk', sans-serif" },
        'ghost': { a: '#ffffff', f: "'Plus Jakarta Sans', sans-serif" }
    }[t];
    r.style.setProperty('--accent', cfg.a);
    r.style.setProperty('--font-main', cfg.f);
}
</script>
</body>
</html>
